<!doctype html>
<html lang="es-AR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nav explorations — Baby's Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #14121c;
    --surface: #211d2e;
    --surface-strong: #2b2538;
    --line: #332c44;
    --ink: #f2eef7;
    --ink-soft: #a89fb5;
    --primary: #ff96c2;
    --primary-ink: #2b1622;
    --primary-tint: rgba(255, 150, 194, 0.16);
    --feed: #ffc078;
    --sleep: #a99cff;
    --diaper: #5fe0c0;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0d0b14;
    color: var(--ink);
    font-family: "Nunito", system-ui, sans-serif;
    padding: 32px 16px 64px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--ink-soft); font-size: 13px; margin: 0 0 28px; max-width: 640px; line-height: 1.5; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1000px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 16px;
  }
  .card h2 { font-size: 15px; margin: 0 0 2px; }
  .card .desc { color: var(--ink-soft); font-size: 12px; margin: 0 0 14px; line-height: 1.45; min-height: 34px; }

  /* Mock "pantalla" con contenido tenue y la barra flotando abajo */
  .screen {
    position: relative;
    height: 220px;
    border-radius: 18px;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(255,150,194,0.06), transparent 60%),
      var(--bg);
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .faux { padding: 16px 16px 0; }
  .faux .line { height: 10px; border-radius: 6px; background: var(--surface-strong); margin-bottom: 10px; }
  .faux .line.w70 { width: 70%; } .faux .line.w40 { width: 40%; } .faux .line.w55 { width: 55%; }
  .faux .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
  .faux .chip { height: 44px; border-radius: 14px; }
  .faux .chip.feed { background: rgba(255,192,120,0.14); }
  .faux .chip.diaper { background: rgba(95,224,192,0.14); }

  /* Barra: contenedor flotante */
  .navwrap {
    position: absolute; left: 0; right: 0; bottom: 14px;
    display: flex; justify-content: center; align-items: center; gap: 10px;
    padding: 0 16px;
  }
  .pill {
    display: flex; align-items: center; gap: 4px;
    background: rgba(33,29,46,0.85);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    backdrop-filter: blur(12px);
  }
  .item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: var(--ink-soft);
    min-width: 48px; padding: 2px 4px;
    font-size: 10px; font-weight: 700;
  }
  .item svg { width: 20px; height: 20px; }

  /* Mic — base. Cada variante override-ea con .v1..v5 */
  .mic {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; color: var(--ink-soft);
  }
  .mic .btn {
    width: 44px; height: 44px; border-radius: 14px;
    background: var(--primary); color: var(--primary-ink);
    display: flex; align-items: center; justify-content: center;
  }
  .mic .btn svg { width: 20px; height: 20px; display: block; }

  /* MIX (la propuesta pedida): ring+glow de V2 con el tamaño de V3, ícono centrado */
  .vmix .btn {
    width: 50px; height: 50px; border-radius: 16px;
    box-shadow: 0 0 0 4px var(--primary-tint), 0 0 18px rgba(255,150,194,0.45);
  }
  .vmix .btn svg { width: 22px; height: 22px; }

  /* V1 — glow suave (mismo tamaño) */
  .v1 .btn { box-shadow: 0 0 18px rgba(255,150,194,0.45); }
  /* V2 — ring + glow (mismo tamaño, más presencia) */
  .v2 .btn { box-shadow: 0 0 0 4px var(--primary-tint), 0 0 16px rgba(255,150,194,0.4); }
  /* V3 — leve bump de tamaño */
  .v3 .btn { width: 50px; height: 50px; border-radius: 16px; box-shadow: 0 0 16px rgba(255,150,194,0.35); }
  .v3 .btn svg { width: 22px; height: 22px; }
  /* V4 — gradiente + elevación (profundidad) */
  .v4 .btn {
    background: linear-gradient(145deg, #ffa9cf, #ff7eb3);
    transform: translateY(-6px);
    box-shadow: 0 10px 20px rgba(255,150,194,0.35), 0 2px 6px rgba(0,0,0,0.4);
  }
  /* V5 — squircle más peso + label Voz */
  .v5 .btn { width: 54px; height: 54px; border-radius: 18px; box-shadow: 0 0 0 5px var(--primary-tint), 0 8px 18px rgba(255,150,194,0.4); }
  .v5 .btn svg { width: 24px; height: 24px; }
</style>
</head>
<body>
  <h1>Barra de navegación — exploraciones</h1>
  <p class="sub">Mic <strong>separado</strong> de la pill (como te gustaba) + <strong>tamaño actual con más peso visual</strong>. Cada variante usa una técnica distinta para dar peso sin agrandar de más. Pasá el mouse / mirá en tu celu. Decime el número que más te cierra (o combinaciones).</p>

  <!-- Defs de íconos (lucide-style, stroke currentColor) -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <g id="i-droplet" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
      </g>
      <g id="i-bottle" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="8" width="10" height="13" rx="3"/><path d="M9 8V5h6v3"/><path d="M9 13h6"/>
      </g>
      <g id="i-help" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M9.6 9.2a2.4 2.4 0 1 1 3.4 2.2c-.8.4-1 .8-1 1.6"/><path d="M12 16.5h.01"/>
      </g>
      <g id="i-mic" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/>
      </g>
    </defs>
  </svg>

  <div class="grid" id="grid"></div>

<script>
  const variants = [
    { cls: "vmix", title: "★ Mix V2+V3 · ícono centrado", desc: "La propuesta: ring + glow de V2 con el tamaño de V3 (50px). Sin label, ícono perfectamente centrado en el chip." },
    { cls: "v1", title: "V1 · Glow suave", desc: "Mismo tamaño. Peso por un resplandor candy sutil alrededor del chip." },
    { cls: "v2", title: "V2 · Ring + glow", desc: "Mismo tamaño. Un halo (ring tint) lo destaca como 'el principal' sin crecer." },
    { cls: "v3", title: "V3 · +Tamaño leve", desc: "Crece apenas (44→50px). El más directo, todavía integrado." },
    { cls: "v4", title: "V4 · Gradiente + elevación", desc: "Mismo tamaño pero flota un poco más arriba, con gradiente. Da profundidad." },
    { cls: "v5", title: "V5 · Squircle con peso", desc: "Más grande + ring + label 'Voz'. El de mayor jerarquía de los cinco." }
  ];

  const icon = (id, color) => `<svg style="color:${color||'currentColor'}"><use href="#${id}"/></svg>`;

  const pill = `
    <div class="pill">
      <div class="item"><span style="color:var(--diaper)">${icon('i-droplet')}</span>Pañal</div>
      <div class="item"><span style="color:var(--feed)">${icon('i-bottle')}</span>Toma</div>
      <div class="item"><span style="color:var(--sleep)">${icon('i-help')}</span>Duda</div>
    </div>`;

  const mic = (cls, label) => `
    <div class="mic ${cls}">
      <div class="btn">${icon('i-mic')}</div>
      ${label ? `<span>${label}</span>` : ``}
    </div>`;

  document.getElementById('grid').innerHTML = variants.map(v => `
    <div class="card">
      <h2>${v.title}</h2>
      <p class="desc">${v.desc}</p>
      <div class="screen">
        <div class="faux">
          <div class="line w40"></div>
          <div class="line w70"></div>
          <div class="cards">
            <div class="chip feed"></div>
            <div class="chip diaper"></div>
          </div>
          <div class="line w55" style="margin-top:14px"></div>
        </div>
        <div class="navwrap">
          ${pill}
          ${mic(v.cls, v.cls === 'v5' ? 'Voz' : '')}
        </div>
      </div>
    </div>
  `).join('');
</script>
</body>
</html>
